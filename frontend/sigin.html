<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoteVault — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f2 50%, #f0e6ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      z-index: 0;
      animation: float 8s ease-in-out infinite;
    }
    body::before {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(59,130,246,0.15), transparent);
      top: -100px; left: -100px;
    }
    body::after {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(124,58,237,0.12), transparent);
      bottom: -80px; right: -80px;
      animation-delay: -4s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: row-reverse;
      width: 900px;
      max-width: 95vw;
      min-height: 520px;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow:
        0 4px 6px rgba(0,0,0,0.02),
        0 12px 24px rgba(0,0,0,0.04),
        0 24px 48px rgba(0,0,0,0.06);
      overflow: hidden;
      animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .brand-side {
      flex: 1;
      background: linear-gradient(160deg, #3b82f6 0%, #6366f1 50%, #7c3aed 100%);
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
      color: #fff;
    }

    .brand-side::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .brand-side::after {
      content: '';
      position: absolute;
      width: 200px; height: 200px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
      top: -60px; left: -60px;
    }

    .brand-logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      position: relative;
    }

    .brand-logo span {
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.8) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-tagline {
      font-size: 15px;
      font-weight: 300;
      line-height: 1.7;
      opacity: 0.9;
      position: relative;
      max-width: 260px;
    }

    .brand-quote {
      margin-top: 40px;
      padding: 20px 24px;
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      border-left: 3px solid rgba(255,255,255,0.4);
      position: relative;
    }

    .brand-quote p {
      font-size: 13px;
      font-style: italic;
      line-height: 1.7;
      opacity: 0.9;
    }

    .brand-quote .author {
      margin-top: 10px;
      font-size: 11px;
      font-style: normal;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.7;
    }

    .form-side {
      flex: 1;
      padding: 48px 44px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-header { margin-bottom: 8px; }

    .form-header h1 {
      font-size: 26px;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: -0.5px;
    }

    .form-header p {
      margin-top: 8px;
      font-size: 14px;
      color: #6b7280;
      line-height: 1.5;
    }

    .form-body {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #1a1a2e;
      background: rgba(255,255,255,0.8);
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      outline: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .input-group input::placeholder { color: #9ca3af; }

    .input-group input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59,130,246,0.08);
      background: #fff;
    }

    .btn-primary {
      width: 100%;
      padding: 15px 24px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      margin-top: 6px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(59,130,246,0.3);
    }

    .btn-primary:active { transform: translateY(0); }

    .signup-link {
      text-align: center;
      font-size: 13px;
      color: #6b7280;
      margin-top: 4px;
    }

    .signup-link a {
      color: #7c3aed;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .signup-link a:hover { color: #6366f1; }

    @media (max-width: 768px) {
      .brand-side { display: none; }
      .container { border-radius: 20px; }
      .form-side { padding: 36px 28px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand-side">
      <div class="brand-logo"><span>&#128221; NoteVault</span></div>
      <p class="brand-tagline">Welcome back! Sign in to access your personal notes and stay productive.</p>
      <div class="brand-quote">
        <p>"The simplest notes often hold the most powerful ideas."</p>
        <div class="author">— Built with Node.js & Express</div>
      </div>
    </div>
    <div class="form-side">
      <div class="form-header">
        <h1>Welcome back</h1>
        <p>Sign in to your NoteVault account and continue where you left off.</p>
      </div>
      <div class="form-body">
        <div class="input-group">
          <label>Username</label>
          <input type="text" placeholder="Enter your username" id="username">
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="Enter your password" id="password">
        </div>
        <button class="btn-primary" id="login">Sign In</button>
        <p class="signup-link">Don't have an account? <a href="/signup.html">Create one</a></p>
      </div>
    </div>
  </div>

  <script>
    document.querySelector("#login").addEventListener("click", async function(){
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      const responce = await axios.post("http://localhost:3000/login", {
        username, password
      })
      const token = responce.data.token;
      localStorage.setItem("token", token);
      window.location.href = "/"
    })
  </script>
</body>
</html>
